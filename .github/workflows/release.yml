name: Release

on:
  push:
    branches: [main, next]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Release Please
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release PR branch
        id: release-pr
        if: steps.release.outputs.prs_created == 'true'
        env:
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const prs = JSON.parse(process.env.RELEASE_PRS ?? '[]');

          if (!Array.isArray(prs) || prs.length === 0) {
            throw new Error('release-please reported prs_created without PR metadata.');
          }

          if (prs.length !== 1) {
            throw new Error(`Expected a single release PR, received ${prs.length}.`);
          }

          const { headBranchName, baseBranchName } = prs[0];
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `head_branch=${headBranchName}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `base_branch=${baseBranchName}\n`);
          NODE

      - name: Checkout release PR branch
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release-pr.outputs.head_branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js for propagation
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'

      - name: Propagate internal dependency bumps
        if: steps.release.outputs.prs_created == 'true'
        run: node scripts/release/propagate-internal-dependency-bumps.mjs --base-ref "origin/${{ steps.release-pr.outputs.base_branch }}"

      - name: Commit propagated release changes
        if: steps.release.outputs.prs_created == 'true'
        run: |
          if git diff --quiet; then
            echo "No propagated release changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .release-please-manifest.json packages/*/package.json packages/*/CHANGELOG.md
          git commit -m "chore: propagate internal dependency bumps"
          git push origin HEAD:${{ steps.release-pr.outputs.head_branch }}

  publish-stable:
    name: Publish Stable
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.releases_created == 'true')
    needs: release-please
    runs-on: ubuntu-latest
    environment: prod
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org/'

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build

      - name: Publish npm packages
        run: |
          for pkg in \
            "@n8n-as-code/n8n-manager-core:packages/core" \
            "@n8n-as-code/n8n-credentials-manager:packages/credentials-manager" \
            "@n8n-as-code/n8n-manager:packages/cli"
          do
            pkg_name="${pkg%%:*}"
            pkg_dir="${pkg##*:}"
            version=$(node -p "require('./${pkg_dir}/package.json').version")
            if npm view "${pkg_name}@${version}" version >/dev/null 2>&1; then
              echo "${pkg_name}@${version} already exists on npm, skipping publish."
            else
              (cd "$pkg_dir" && npm publish --access public --tag latest)
            fi
          done

  prepare-next:
    name: Prepare Next Version
    if: github.ref == 'refs/heads/next' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.next-version.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'

      - name: Compute next prerelease version
        id: next-version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const { execFileSync } = require('child_process');

          function exec(args) {
            return execFileSync('git', args, { encoding: 'utf8' }).trim();
          }

          function parse(version) {
            const [major, minor, patch] = version.split('-')[0].split('.').map(Number);
            return { major, minor, patch };
          }

          function format({ major, minor, patch }) {
            return `${major}.${minor}.${patch}`;
          }

          function bump(version, level) {
            const next = parse(version);
            if (level === 'major') {
              next.major += 1;
              next.minor = 0;
              next.patch = 0;
            } else if (level === 'minor') {
              next.minor += 1;
              next.patch = 0;
            } else {
              next.patch += 1;
            }
            return format(next);
          }

          const packages = [
            'packages/core',
            'packages/credentials-manager',
            'packages/cli',
          ];
          const currentVersion = JSON.parse(fs.readFileSync('packages/cli/package.json', 'utf8')).version;

          let range = '';
          try {
            range = `${exec(['describe', '--tags', '--abbrev=0'])}..HEAD`;
          } catch {
            range = 'HEAD';
          }

          const commits = exec(['log', '--format=%s%n%b', range]);
          if (!commits.trim()) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'changed=false\n');
            process.exit(0);
          }

          const level = /BREAKING CHANGE|^[a-z]+(?:\(.+\))?!:/m.test(commits)
            ? 'major'
            : /^feat(?:\(.+\))?:/m.test(commits)
              ? 'minor'
              : /^fix(?:\(.+\))?:/m.test(commits)
                ? 'patch'
                : null;

          if (!level) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'changed=false\n');
            process.exit(0);
          }

          const baseVersion = bump(currentVersion, level);
          const version = `${baseVersion}-next.${process.env.GITHUB_RUN_NUMBER}`;
          for (const dir of packages) {
            const path = `${dir}/package.json`;
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = version;
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `changed=true\nversion=${version}\n`);
          NODE

      - name: Sync internal dependency versions
        if: steps.next-version.outputs.changed == 'true'
        run: node scripts/sync-dependencies.mjs --write

      - name: Refresh lockfile
        if: steps.next-version.outputs.changed == 'true'
        run: npm install --package-lock-only

      - name: Upload next package metadata
        if: steps.next-version.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: next-package-metadata
          path: |
            package-lock.json
            packages/core/package.json
            packages/credentials-manager/package.json
            packages/cli/package.json

  publish-next:
    name: Publish Next
    if: github.ref == 'refs/heads/next' && needs.prepare-next.outputs.changed == 'true'
    needs: prepare-next
    runs-on: ubuntu-latest
    environment: prod
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download next package metadata
        uses: actions/download-artifact@v4
        with:
          name: next-package-metadata
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org/'

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build

      - name: Publish npm packages
        run: |
          for pkg in \
            "@n8n-as-code/n8n-manager-core:packages/core" \
            "@n8n-as-code/n8n-credentials-manager:packages/credentials-manager" \
            "@n8n-as-code/n8n-manager:packages/cli"
          do
            pkg_name="${pkg%%:*}"
            pkg_dir="${pkg##*:}"
            version=$(node -p "require('./${pkg_dir}/package.json').version")
            if npm view "${pkg_name}@${version}" version >/dev/null 2>&1; then
              echo "${pkg_name}@${version} already exists on npm, skipping publish."
            else
              (cd "$pkg_dir" && npm publish --access public --tag next)
            fi
          done
