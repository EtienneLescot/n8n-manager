name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, next]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Check internal dependency alignment
        run: npm run check:deps

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test
